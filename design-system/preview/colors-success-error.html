<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
<div class="row" style="flex: 1;">
  <div class="swatch" style="background: #22c55e;">
    <div class="swatch-token" style="color:#000;">--color-success</div>
    <div>
      <div class="swatch-hex" style="color:#000;">#22c55e</div>
      <div class="swatch-note" style="color:rgba(0,0,0,0.7);">Checkmark, success text</div>
    </div>
  </div>
  <div class="swatch" style="background: #071a0a;">
    <div class="swatch-token" style="color:#22c55e;">--color-success-bg</div>
    <div>
      <div class="swatch-hex" style="color:#22c55e;">#071a0a</div>
      <div class="swatch-note" style="color:rgba(34,197,94,0.7);">Success panel bg</div>
    </div>
  </div>
  <div class="swatch" style="background: #0f3015;">
    <div class="swatch-token" style="color:#fff;">--color-success-border</div>
    <div>
      <div class="swatch-hex" style="color:#fff;">#0f3015</div>
      <div class="swatch-note" style="color:rgba(255,255,255,0.7);">Success panel border</div>
    </div>
  </div>
  <div class="swatch" style="background: #ef4444;">
    <div class="swatch-token" style="color:#fff;">--color-error</div>
    <div>
      <div class="swatch-hex" style="color:#fff;">#ef4444</div>
      <div class="swatch-note" style="color:rgba(255,255,255,0.85);">Error text · #1f0808 bg</div>
    </div>
  </div>
</div>
</div>
</body></html>
