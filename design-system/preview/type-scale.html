<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css">
<style>
.specimen { display: flex; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: 1px solid var(--color-border); }
.specimen:last-child { border-bottom: none; }
.spec-meta { width: 130px; flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); }
.spec-text { color: var(--color-text); }
</style>
</head><body>
<div class="card">
<div class="specimen">
  <div class="spec-meta">10/700 · +0.8</div>
  <div class="spec-text" style="font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color: var(--color-accent-text); background: var(--color-accent); padding: 2px 6px; border-radius: 4px;">PRO</div>
</div>
<div class="specimen">
  <div class="spec-meta">11/400 · 1.3</div>
  <div class="spec-text" style="font-size:11px; line-height:1.3;">3 free exports left today. <span class="muted-text">— Caption</span></div>
</div>
<div class="specimen">
  <div class="spec-meta">12/400 · 1.4</div>
  <div class="spec-text" style="font-size:12px; line-height:1.4;">24 rows · 6 columns <span class="muted-text">— Body small</span></div>
</div>
<div class="specimen">
  <div class="spec-meta">13/500 · 1.0</div>
  <div class="spec-text" style="font-size:13px; font-weight:500;">Export CSV <span class="muted-text" style="font-weight:400;">— Button</span></div>
</div>
<div class="specimen">
  <div class="spec-meta">13/400 · 1.5</div>
  <div class="spec-text" style="font-size:13px; line-height:1.5;">Table 1 <span class="muted-text">— Body</span></div>
</div>
<div class="specimen">
  <div class="spec-meta">13/600 · 1.2</div>
  <div class="spec-text" style="font-size:13px; font-weight:600;">Tables found <span class="muted-text" style="font-weight:400;">— Header</span></div>
</div>
<div class="specimen">
  <div class="spec-meta">14/700</div>
  <div class="spec-text" style="font-size:14px; font-weight:700; letter-spacing:0.3px;">SnapCSV <span class="muted-text" style="font-weight:400; letter-spacing:0;">— Logo text</span></div>
</div>
</div>
</body></html>
