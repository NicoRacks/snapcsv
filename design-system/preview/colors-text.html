<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
<div class="row" style="flex: 1;">
  <div class="swatch" style="background: #0c1824;">
    <div class="swatch-token" style="color:#d8eaf0;">--color-text</div>
    <div>
      <div class="swatch-hex" style="color:#d8eaf0;">#d8eaf0</div>
      <div class="swatch-contrast" style="color:#d8eaf0;">~13:1 AAA</div>
      <div class="swatch-note" style="color:#d8eaf0;">Body, table data</div>
    </div>
  </div>
  <div class="swatch" style="background: #0c1824;">
    <div class="swatch-token" style="color:#6da8c0;">--color-text-muted</div>
    <div>
      <div class="swatch-hex" style="color:#6da8c0;">#6da8c0</div>
      <div class="swatch-contrast" style="color:#6da8c0;">~8:1 AAA</div>
      <div class="swatch-note" style="color:#6da8c0;">Counts, labels, hints</div>
    </div>
  </div>
  <div class="swatch" style="background: #0c1824;">
    <div class="swatch-token" style="color:#507a95;">--color-text-disabled</div>
    <div>
      <div class="swatch-hex" style="color:#507a95;">#507a95</div>
      <div class="swatch-contrast" style="color:#507a95;">~4.7:1 AA</div>
      <div class="swatch-note" style="color:#507a95;">Placeholder, inactive</div>
    </div>
  </div>
</div>
</div>
</body></html>
