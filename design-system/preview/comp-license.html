<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="_components.css"></head><body>
<div class="card">
  <div class="label-eyebrow">License input panel — default / focus / error</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
    <div class="popup-frame" style="padding: 14px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label class="sc-label">Activate Pro License</label>
        <input class="sc-input" type="text" placeholder="Paste your license key…" readonly />
        <div style="display: flex; gap: 8px;">
          <button class="sc-btn sc-btn-primary" type="button" style="flex:1;">Activate</button>
          <button class="sc-btn sc-btn-ghost" type="button" style="width:auto; padding: 7px 12px;">Cancel</button>
        </div>
      </div>
    </div>
    <div class="popup-frame" style="padding: 14px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label class="sc-label">Activate Pro License</label>
        <input class="sc-input is-focus" type="text" value="A1B2C3D4-E5F6-G7H8" readonly />
        <div style="display: flex; gap: 8px;">
          <button class="sc-btn sc-btn-primary" type="button" style="flex:1;">Activate</button>
          <button class="sc-btn sc-btn-ghost" type="button" style="width:auto; padding: 7px 12px;">Cancel</button>
        </div>
        <div class="sc-slow-msg">Taking longer than expected…</div>
      </div>
    </div>
    <div class="popup-frame" style="padding: 14px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label class="sc-label">Activate Pro License</label>
        <input class="sc-input is-error" type="text" value="WRONG-KEY-123" readonly />
        <div style="display: flex; gap: 8px;">
          <button class="sc-btn sc-btn-primary" type="button" style="flex:1;">Activate</button>
          <button class="sc-btn sc-btn-ghost" type="button" style="width:auto; padding: 7px 12px;">Cancel</button>
        </div>
        <div class="sc-error-msg" role="alert">Invalid license key.</div>
      </div>
    </div>
  </div>
</div>
</body></html>
