<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="_components.css"></head><body>
<div class="card">
  <div class="label-eyebrow">Secondary &amp; ghost buttons</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">secondary · default</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-secondary" type="button">Activate license key</button></div>
    </div>
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">secondary · hover</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-secondary is-hover" type="button">Activate license key</button></div>
    </div>
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">ghost · default</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-ghost" type="button">Maybe later</button></div>
    </div>
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">ghost · hover</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-ghost is-hover" type="button">Maybe later</button></div>
    </div>
  </div>
</div>
</body></html>
