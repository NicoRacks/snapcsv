<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
<div class="row" style="flex: 1;">
  <div class="swatch" style="background: #0ea5b8;">
    <div class="swatch-token" style="color:#fff;">--color-accent</div>
    <div>
      <div class="swatch-hex" style="color:#fff;">#0ea5b8</div>
      <div class="swatch-note" style="color:rgba(255,255,255,0.85);">Buttons, focus, PRO badge</div>
    </div>
  </div>
  <div class="swatch" style="background: #12bcd0;">
    <div class="swatch-token" style="color:#000;">--color-accent-hover</div>
    <div>
      <div class="swatch-hex" style="color:#000;">#12bcd0</div>
      <div class="swatch-note" style="color:rgba(0,0,0,0.7);">Primary btn hover</div>
    </div>
  </div>
  <div class="swatch" style="background: #082030;">
    <div class="swatch-token">--color-accent-muted</div>
    <div>
      <div class="swatch-hex">#082030</div>
      <div class="swatch-note">Focus ring bg, tints</div>
    </div>
  </div>
  <div class="swatch" style="background: #ffffff;">
    <div class="swatch-token" style="color:#000;">--color-accent-text</div>
    <div>
      <div class="swatch-hex" style="color:#000;">#ffffff</div>
      <div class="swatch-note" style="color:rgba(0,0,0,0.7);">Text on teal</div>
    </div>
  </div>
</div>
</div>
</body></html>
