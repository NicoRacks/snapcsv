<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="_components.css"></head><body>
<div class="card">
  <div class="label-eyebrow">Primary button — Export CSV / Activate</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">default</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-primary" type="button">Export CSV</button></div>
    </div>
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">hover</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-primary is-hover" type="button">Export CSV</button></div>
    </div>
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">focus</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-primary is-focus" type="button">Export CSV</button></div>
    </div>
    <div>
      <div style="font-size: 10px; color: var(--color-text-muted); margin-bottom: 6px; font-family: var(--font-mono);">disabled</div>
      <div class="popup-frame" style="padding: 10px 14px;"><button class="sc-btn sc-btn-primary is-disabled" type="button" disabled>Export CSV</button></div>
    </div>
  </div>
</div>
</body></html>
