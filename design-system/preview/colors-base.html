<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
<div class="row" style="flex: 1;">
  <div class="swatch" style="background: #090d12;">
    <div class="swatch-token">--color-bg</div>
    <div>
      <div class="swatch-hex">#090d12</div>
      <div class="swatch-note">Layer 0 · popup bg</div>
    </div>
  </div>
  <div class="swatch" style="background: #0c1824;">
    <div class="swatch-token">--color-surface</div>
    <div>
      <div class="swatch-hex">#0c1824</div>
      <div class="swatch-note">Layer 1 · cards, inputs, rows</div>
    </div>
  </div>
  <div class="swatch" style="background: #132535;">
    <div class="swatch-token">--color-surface-raised</div>
    <div>
      <div class="swatch-hex">#132535</div>
      <div class="swatch-note">Layer 2 · hover, selected</div>
    </div>
  </div>
  <div class="swatch" style="background: #142030;">
    <div class="swatch-token">--color-border</div>
    <div>
      <div class="swatch-hex">#142030</div>
      <div class="swatch-note">All dividers + outlines</div>
    </div>
  </div>
</div>
</div>
</body></html>
