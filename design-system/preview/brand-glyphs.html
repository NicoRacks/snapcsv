<!DOCTYPE html><html><head><meta charset="utf-8">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/IBMPlexSans-Italic-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Variable.ttf">
  <meta name="ext-resource-dependency" content="assets/fonts/JetBrainsMono-Italic-Variable.ttf">
<link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="_components.css">
<style>
.glyph-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.glyph-cell { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 10px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.g-char { font-size: 20px; color: var(--color-text); line-height: 1; }
.g-char.accent { color: var(--color-accent); }
.g-char.upgrade { color: var(--color-upgrade); }
.g-char.success { color: var(--color-success); }
.g-name { font-size: 9px; color: var(--color-text-muted); text-align: center; line-height: 1.2; }
</style>
</head><body>
<div class="card">
  <div class="label-eyebrow">Iconography — Unicode glyphs only · no SVG, no icon font, no emoji</div>
  <div class="glyph-grid">
    <div class="glyph-cell"><span class="g-char accent">⬡</span><span class="g-name">U+2B22<br>logo</span></div>
    <div class="glyph-cell"><span class="g-char">⊘</span><span class="g-name">U+2298<br>empty</span></div>
    <div class="glyph-cell"><span class="g-char">⚠</span><span class="g-name">U+26A0<br>notice</span></div>
    <div class="glyph-cell"><span class="g-char success">✓</span><span class="g-name">U+2713<br>success</span></div>
    <div class="glyph-cell"><span class="g-char">›</span><span class="g-name">U+203A<br>chevron</span></div>
    <div class="glyph-cell"><span class="g-char accent">←</span><span class="g-name">U+2190<br>back</span></div>
    <div class="glyph-cell"><span class="g-char upgrade">→</span><span class="g-name">U+2192<br>outbound</span></div>
    <div class="glyph-cell"><span class="g-char">·</span><span class="g-name">U+00B7<br>separator</span></div>
    <div class="glyph-cell"><span class="g-char">…</span><span class="g-name">U+2026<br>ellipsis</span></div>
    <div class="glyph-cell"><span class="g-char">—</span><span class="g-name">U+2014<br>em-dash</span></div>
  </div>
</div>
</body></html>
